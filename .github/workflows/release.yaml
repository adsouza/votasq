name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.4"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVER_URL: ${{ vars.SERVER_URL }}

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/client/android/app/upload-keystore.jks
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: >
          flutter build apk --flavor production --target lib/main_production.dart --release
          --dart-define=SERVER_URL=${{ env.SERVER_URL }}
          --split-per-abi
          --split-debug-info=build/debug-info
          --obfuscate
          --tree-shake-icons

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/client/android/app/upload-keystore.jks
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: >
          flutter build appbundle --flavor production --target lib/main_production.dart --release
          --dart-define=SERVER_URL=${{ env.SERVER_URL }}
          --split-debug-info=build/debug-info
          --obfuscate
          --tree-shake-icons

      - name: Collect Android artifacts
        run: |
          find build/app/outputs -name 'app-production-*-release.apk' -exec cp {} . \;
          find build/app/outputs -name 'app-production-release.aab' -exec cp {} . \;

      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: |
            apps/client/app-production-*-release.apk
            apps/client/app-production-release.aab

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter build web --target lib/main_production.dart --release --dart-define=SERVER_URL=

      - name: Archive web build
        run: tar -czf web-release.tar.gz -C build/web .

      - uses: actions/upload-artifact@v7
        with:
          name: web
          path: apps/client/web-release.tar.gz

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: >
          flutter build macos --flavor production --target lib/main_production.dart --release
          --dart-define=SERVER_URL=${{ env.SERVER_URL }}
          --split-debug-info=build/debug-info
          --obfuscate
          --tree-shake-icons

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release-production
          zip -ry "$GITHUB_WORKSPACE/apps/client/macos-release.zip" *.app

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: apps/client/macos-release.zip

  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - run: flutter build linux --target lib/main_production.dart --release --dart-define=SERVER_URL=${{ env.SERVER_URL }}

      - name: Archive Linux build
        run: tar -czf linux-release.tar.gz -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: apps/client/linux-release.tar.gz

  create-release:
    needs: [android, web, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app-production-*-release.apk
            app-production-release.aab
            web-release.tar.gz
            macos-release.zip
            linux-release.tar.gz
