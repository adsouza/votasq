name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.4"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVER_URL: ${{ vars.SERVER_URL }}

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Build APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/client/android/app/upload-keystore.jks
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: >
          flutter build apk --flavor production --target lib/main_production.dart --release
          --dart-define=SERVER_URL=${{ env.SERVER_URL }}
          --split-per-abi
          --split-debug-info=build/debug-info
          --obfuscate
          --tree-shake-icons

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/client/android/app/upload-keystore.jks
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD }}
        run: >
          flutter build appbundle --flavor production --target lib/main_production.dart --release
          --dart-define=SERVER_URL=${{ env.SERVER_URL }}
          --split-debug-info=build/debug-info
          --obfuscate
          --tree-shake-icons

      - name: Collect Android artifacts
        run: |
          find build/app/outputs -name 'app-production-*-release.apk' -exec cp {} . \;
          find build/app/outputs -name 'app-production-release.aab' -exec cp {} . \;

      - uses: actions/upload-artifact@v7
        with:
          name: android
          path: |
            apps/client/app-production-*-release.apk
            apps/client/app-production-release.aab

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - run: flutter build web --target lib/main_production.dart --release --dart-define=SERVER_URL=${{ env.SERVER_URL }}

      - name: Archive web build
        run: tar -czf web-release.tar.gz -C build/web .

      - uses: actions/upload-artifact@v7
        with:
          name: web
          path: apps/client/web-release.tar.gz

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/client
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Apple certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MACOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$MACOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - run: >
          flutter build macos --flavor production --target lib/main_production.dart --release
          --dart-define=SERVER_URL=${{ env.SERVER_URL }}
          --split-debug-info=build/debug-info
          --obfuscate
          --tree-shake-icons

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release-production
          zip -ry "$GITHUB_WORKSPACE/apps/client/macos-release.zip" *.app

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: apps/client/macos-release.zip

  create-release:
    needs: [android, web, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app-production-*-release.apk
            app-production-release.aab
            web-release.tar.gz
            macos-release.zip
