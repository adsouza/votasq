name: ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  semantic_pull_request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: "**/*.md"
      modified_files_only: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"

      - name: Install Dependencies
        run: |
          flutter pub global activate very_good_cli
          very_good packages get --recursive

      - name: Check Formatting
        run: dart format --set-exit-if-changed apps packages

      - name: Analyze
        run: flutter analyze apps packages

      - name: Run Tests
        run: very_good test --recursive --no-optimization --coverage --test-randomize-ordering-seed random

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"

      - name: Install Dependencies
        run: |
          dart pub global activate dart_frog_cli
          dart pub get

      - name: Start Firestore Emulator
        run: |
          npm install -g firebase-tools
          firebase emulators:start --only firestore &
          # Wait for emulator to be ready
          for i in $(seq 1 30); do
            curl -s http://localhost:8081 > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run E2E Tests
        run: dart test apps/server/e2e/ -t e2e
