name: client
description: The Flutter client for Votasq.
version: 1.0.0+2
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

resolution: workspace

dependencies:
  bloc: ^9.2.0
  cloud_firestore: ^6.1.3 # Official FlutterFire
  feedback: ^3.1.0
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_storage: ^13.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  shared: any # Use the same shared logic as the server
  uuid: ^4.5.1

dev_dependencies:
  bloc_lint: ^0.4.0
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.22
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
